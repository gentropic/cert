<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCU — Certificate Validation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #111110;
  --surface: #1a1a18;
  --border: #2a2a26;
  --border-hi: #3a3a34;
  --text: #d4d0c8;
  --text-dim: #8a8780;
  --text-faint: #5a5850;
  --amber: #d4a017;
  --amber-dim: rgba(212,160,23,0.12);
  --cyan: #3ec9d1;
  --cyan-dim: rgba(62,201,209,0.12);
  --green: #6abf69;
  --green-dim: rgba(106,191,105,0.12);
  --red: #c0392b;
  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.12);
  --accent: #d4a017;
  --accent-dim: rgba(212,160,23,0.12);
  --accent-glow: rgba(212,160,23,0.2);
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 999;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 256px 256px;
}

.bg-cables {
  position: fixed; inset: 0; z-index: 0; overflow: hidden;
  opacity: 0.06;
  display: none;
}
.bg-cables svg { width: 100%; height: 100%; }

.container {
  position: relative; z-index: 1;
  max-width: 860px;
  margin: 0 auto;
  padding: 4rem 2rem 3rem;
}

.header { text-align: center; margin-bottom: 3rem; animation: fadeUp 0.6s ease-out both; }
.logo { font-family: var(--mono); font-size: 3.2rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 0.5rem; color: var(--text); }
.series-tag { font-family: var(--mono); font-size: 0.78rem; color: var(--accent); margin-top: 0.6rem; opacity: 0; transition: opacity 0.3s, color 0.3s; }
.series-tag.visible { opacity: 1; }
.tagline { font-size: 0.95rem; color: var(--text-dim); font-family: var(--mono); font-weight: 400; letter-spacing: 0.01em; }

.form-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 2.5rem 2rem;
  max-width: 480px;
  margin: 0 auto 2rem;
  animation: fadeUp 0.6s 0.15s ease-out both;
}
.form-card h2 { font-family: var(--mono); font-size: 1rem; font-weight: 600; margin-bottom: 1.5rem; color: var(--text); }
.form-group { margin-bottom: 1.2rem; }
.form-group label { display: block; font-family: var(--mono); font-size: 0.75rem; color: var(--text-dim); margin-bottom: 0.4rem; }
.form-group input {
  width: 100%;
  padding: 0.7rem 1rem;
  font-family: var(--mono);
  font-size: 0.85rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.form-group input:focus { border-color: var(--accent); }
.form-group input::placeholder { color: var(--text-faint); }

.validate-btn {
  display: block; width: 100%;
  font-family: var(--mono); font-size: 0.85rem; font-weight: 600;
  padding: 0.75rem;
  border: 1.5px solid var(--accent);
  border-radius: 6px;
  background: var(--accent-dim);
  color: var(--accent);
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 0.5rem;
}
.validate-btn:hover { background: var(--accent); color: var(--bg); box-shadow: 0 0 20px var(--accent-glow); }

.error-msg { font-family: var(--mono); font-size: 0.78rem; color: var(--red); margin-top: 1rem; display: none; }
.error-msg.visible { display: block; }

.cert-preview { display: none; animation: fadeUp 0.6s ease-out both; }
.cert-preview.visible { display: block; }

.cert-controls { display: flex; justify-content: center; align-items: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }

.lang-toggle {
  font-family: var(--mono); font-size: 0.78rem;
  padding: 0.4rem 0.8rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface);
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
}
.lang-toggle:hover { border-color: var(--border-hi); color: var(--text); }
.lang-toggle.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

.download-btn {
  display: inline-flex; align-items: center; gap: 0.5rem;
  font-family: var(--mono); font-size: 0.82rem; font-weight: 600;
  padding: 0.5rem 1.2rem;
  border: 1.5px solid var(--accent);
  border-radius: 6px;
  background: var(--accent-dim);
  color: var(--accent);
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s;
}
.download-btn:hover { background: var(--accent); color: var(--bg); box-shadow: 0 0 20px var(--accent-glow); }

.back-btn {
  font-family: var(--mono); font-size: 0.78rem;
  padding: 0.5rem 1rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
}
.back-btn:hover { border-color: var(--border-hi); color: var(--text); }

.canvas-wrap { display: flex; justify-content: center; margin-bottom: 1.5rem; }
.canvas-wrap canvas { max-width: 100%; height: auto; border: 1px solid var(--border); border-radius: 4px; }

/* Trust panel — the new piece */
.trust-panel {
  max-width: 720px;
  margin: 0 auto 2rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.5rem 1.75rem;
  font-family: var(--mono);
  font-size: 0.82rem;
}
.trust-panel h3 {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 1rem;
}
.trust-row {
  display: flex; align-items: flex-start; gap: 0.75rem;
  padding: 0.5rem 0;
  border-bottom: 1px dashed var(--border);
}
.trust-row:last-child { border-bottom: none; }
.trust-icon { flex: 0 0 1.4rem; font-size: 1rem; line-height: 1.4rem; }
.trust-icon.ok { color: var(--green); }
.trust-icon.bad { color: var(--red); }
.trust-icon.warn { color: var(--amber); }
.trust-icon.pending { color: var(--text-faint); }
.trust-label { flex: 1 1 auto; }
.trust-label strong { display: block; color: var(--text); font-weight: 500; }
.trust-label span { display: block; color: var(--text-dim); font-size: 0.76rem; margin-top: 0.15rem; }
.trust-link { color: var(--accent); text-decoration: none; font-size: 0.76rem; }
.trust-link:hover { text-decoration: underline; }

.share-section { max-width: 600px; margin: 0 auto 2rem; }
.share-section label { display: block; font-family: var(--mono); font-size: 0.72rem; color: var(--text-faint); margin-bottom: 0.4rem; }
.share-row { display: flex; gap: 0.5rem; }
.share-row input {
  flex: 1;
  padding: 0.5rem 0.8rem;
  font-family: var(--mono); font-size: 0.72rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-dim);
  outline: none;
}
.copy-btn {
  font-family: var(--mono); font-size: 0.72rem;
  padding: 0.5rem 0.8rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface);
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.copy-btn:hover { border-color: var(--border-hi); color: var(--text); }

.downloads-row { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; margin-top: 1rem; }
.downloads-row .download-btn { font-size: 0.74rem; padding: 0.4rem 0.9rem; }

.footer { text-align: center; padding: 2rem 0 1rem; font-size: 0.65rem; color: var(--text-faint); font-family: var(--mono); animation: fadeUp 0.6s 0.25s ease-out both; }
.footer a { color: var(--text-dim); text-decoration: none; transition: color 0.15s; }
.footer a:hover { color: var(--cyan); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 600px) {
  .container { padding: 2.5rem 1.2rem 2rem; }
  .logo { font-size: 2.2rem; }
  .form-card { padding: 1.8rem 1.2rem; }
  .cert-controls { flex-direction: column; gap: 0.8rem; }
}
</style>

<div class="container">
  <header class="header">
    <div class="logo">GCU</div>
    <div class="tagline">certificate validation</div>
    <div id="seriesTag" class="series-tag"></div>
  </header>

  <div id="formSection" class="form-card">
    <h2>Validate your certificate</h2>

<script type="module">
import * as engine from './validator-bundle.js';
window.__engine = engine;
window.dispatchEvent(new Event('__engine-ready'));
</script>
<script>
/* ══════════════════════════════════════════════════
   Configuration
   ══════════════════════════════════════════════════ */

let SERIES = {};
let COURSES = {};

const ISSUER_DID = 'did:web:gentropic.org';

const STRINGS = {
  en: { certOf: 'CERTIFICATE OF COMPLETION', certifies: 'This certifies that', completed: 'has successfully completed', topics: 'Topics covered', workload: 'Workload', hours: 'hours', dateLabel: 'Date of completion', validCode: 'Validation code', validURL: 'Verify at' },
  pt: { certOf: 'CERTIFICADO DE CONCLUS\u00c3O', certifies: 'Certificamos que', completed: 'concluiu com \u00eaxito', topics: 'T\u00f3picos abordados', workload: 'Carga hor\u00e1ria', hours: 'horas', dateLabel: 'Data de conclus\u00e3o', validCode: 'C\u00f3digo de valida\u00e7\u00e3o', validURL: 'Verifique em' },
};

let currentLang = 'en';
let currentCert = null;
let isPreview = false;

/* ══════════════════════════════════════════════════
   Init
   ══════════════════════════════════════════════════ */

async function init() {
  try {
    const resp = await fetch('./courses.json');
    if (resp.ok) {
      const cfg = await resp.json();
      SERIES = cfg.series || {};
      COURSES = cfg.courses || {};
    }
  } catch (_) { /* data unavailable */ }

  const hash = window.location.hash.slice(1);
  if (hash) {
    const params = new URLSearchParams(hash);
    const preview = params.get('preview');
    if (preview) {
      const previewName = params.get('n') ||
        (Math.random() < 0.5 ? 'Mitsuha Miyamizu' : 'Taki Tachibana');
      enterPreviewMode(preview, previewName);
    } else {
      const code = params.get('v');
      const name = params.get('n');
      if (code && name) {
        document.getElementById('nameInput').value = name;
        document.getElementById('codeInput').value = code;
        validate();
      }
    }
  }
}
document.fonts.ready.then(init);

/* ══════════════════════════════════════════════════
   Form & validation
   ══════════════════════════════════════════════════ */

function normalize(s) {
  return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim();
}

async function validate() {
  const name = document.getElementById('nameInput').value.trim();
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  const errEl = document.getElementById('errorMsg');

  if (!name || !code) {
    showError(errEl, 'Please enter both name and validation code.');
    return;
  }

  // Fetch the signed credential — our manifest-free model.
  let credential;
  try {
    const resp = await fetch(`./credentials/${code}.json`);
    if (!resp.ok) throw new Error(`${resp.status}`);
    credential = await resp.json();
  } catch (e) {
    showError(errEl, `No certificate found for code ${code}.`);
    return;
  }

  const credName = credential?.credentialSubject?.name ?? '';
  if (normalize(credName) !== normalize(name)) {
    showError(errEl, 'Name does not match the certificate for this code.');
    return;
  }

  const courseKey = guessCourseKey(code);
  const course = COURSES[courseKey];
  if (!course) {
    showError(errEl, `Unknown course: ${courseKey}`);
    return;
  }

  errEl.classList.remove('visible');
  currentCert = {
    name: credName,
    code,
    courseKey,
    date: (credential.validFrom || '').slice(0, 10),
    credential,
  };
  showPreview();
  runTrustChecks().catch((e) => console.error('Trust checks failed:', e));
}

function guessCourseKey(code) {
  // Credential code is "{COURSE}-{6 hex}" — strip the suffix.
  return code.replace(/-[^-]+$/, '');
}

function showError(el, msg) {
  el.textContent = msg;
  el.classList.add('visible');
}

function enterPreviewMode(courseKey, name) {
  const course = COURSES[courseKey];
  if (!course) return;
  isPreview = true;
  currentCert = {
    name,
    courseKey,
    code: courseKey + '-SAMPLE',
    date: new Date().toISOString().slice(0, 10),
  };
  showPreview();
}

/* ══════════════════════════════════════════════════
   UI state
   ══════════════════════════════════════════════════ */

function applyTheme(hex) {
  const el = document.documentElement;
  el.style.setProperty('--accent', hex);
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  el.style.setProperty('--accent-dim', `rgba(${r},${g},${b},0.12)`);
  el.style.setProperty('--accent-glow', `rgba(${r},${g},${b},0.2)`);
}

function showPreview() {
  document.getElementById('formSection').style.display = 'none';
  document.getElementById('certPreview').classList.add('visible');

  const course = COURSES[currentCert.courseKey];
  const series = SERIES[course.series];
  applyTheme(series.pageAccent);

  document.querySelector('.bg-cables').style.display =
    series.pageBg === 'cables' ? 'block' : 'none';

  const tag = document.getElementById('seriesTag');
  tag.textContent = series.name + ' series';
  tag.classList.add('visible');

  if (isPreview) {
    document.getElementById('shareURL').value = 'Preview mode \u2014 not a real certificate';
    document.getElementById('shareBtn').style.display = 'none';
    document.getElementById('trustPanel').style.display = 'none';
    document.getElementById('pdfBtn').style.display = 'none';
  } else {
    const base = window.location.href.split('#')[0];
    const url = base + '#v=' + encodeURIComponent(currentCert.code) + '&n=' + encodeURIComponent(currentCert.name);
    document.getElementById('shareURL').value = url;
    document.getElementById('shareBtn').style.display = navigator.share ? 'block' : 'none';
    document.getElementById('pdfBtn').style.display = '';
    document.getElementById('dlCredential').href = `./credentials/${currentCert.code}.json`;
    document.getElementById('dlEndorsement').href = `./endorsements/${currentCert.code}.json`;
    document.getElementById('dlRekor').href = `./credentials/${currentCert.code}.rekor.bundle`;
    document.getElementById('dlVcPlayground').href = `https://vc.digitalbazaar.com/verifier/?credential=${encodeURIComponent(JSON.stringify(currentCert.credential))}`;
    document.getElementById('trustPanel').style.display = '';
  }

  renderCertificate();
}

function showForm() {
  isPreview = false;
  document.getElementById('formSection').style.display = 'block';
  document.getElementById('certPreview').classList.remove('visible');
  document.getElementById('seriesTag').classList.remove('visible');
  document.querySelector('.bg-cables').style.display = 'none';
  applyTheme('#d4a017');
  currentCert = null;
}

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btnEN').classList.toggle('active', lang === 'en');
  document.getElementById('btnPT').classList.toggle('active', lang === 'pt');
  renderCertificate();
}

function copyShare() {
  const input = document.getElementById('shareURL');
  navigator.clipboard.writeText(input.value).then(() => {
    const btn = input.nextElementSibling;
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
  });
}

function shareCert() {
  const course = COURSES[currentCert.courseKey];
  const url = document.getElementById('shareURL').value;
  navigator.share({
    title: course.title[currentLang],
    text: currentCert.name + ' — ' + course.title[currentLang],
    url,
  }).catch(() => {});
}

async function downloadPdf() {
  if (!currentCert || isPreview) return;
  const btn = document.getElementById('pdfBtn');
  const origText = btn.textContent;
  btn.textContent = 'Generating…';
  btn.disabled = true;
  try {
    const engine = await awaitEngine();
    const course = COURSES[currentCert.courseKey];
    const series = SERIES[course.series];

    const [sansRegular, sansBold, monoRegular, monoBold, iccProfile, endorsement, rekorBundleResp] = await Promise.all([
      fetchBytes('./fonts/IBMPlexSans-Regular.otf'),
      fetchBytes('./fonts/IBMPlexSans-Bold.otf'),
      fetchBytes('./fonts/IBMPlexMono-Regular.otf'),
      fetchBytes('./fonts/IBMPlexMono-Bold.otf'),
      fetchBytes('./sRGB-IEC61966-2.1.icc'),
      fetchBytes(`./endorsements/${currentCert.code}.json`),
      fetch(`./credentials/${currentCert.code}.rekor.bundle`),
    ]);
    const rekorBundle = rekorBundleResp.ok ? new Uint8Array(await rekorBundleResp.arrayBuffer()) : undefined;
    const credentialBytes = new TextEncoder().encode(JSON.stringify(currentCert.credential, null, 2));

    const bytes = await engine.renderCertificatePdf({
      recipientName: currentCert.name,
      courseName: course.title.en,
      courseCode: currentCert.courseKey,
      credentialCode: currentCert.code,
      dateIso: currentCert.date + 'T00:00:00Z',
      hours: course.hours,
      topics: course.desc.en,
      issuerName: series.issuer,
      issuerLabel: series.issuerTitle.en,
      orgName: series.org,
      seriesName: series.name,
      validatorUrl: `${location.origin}${location.pathname}#v=${encodeURIComponent(currentCert.code)}&n=${encodeURIComponent(currentCert.name)}`,
      accentColor: series.pageAccent,
      fonts: { sansRegular, sansBold, monoRegular, monoBold },
      issuerId: ISSUER_DID,
      credentialHash: await sha256Hex(JSON.stringify(currentCert.credential, null, 2)),
      iccProfile,
      attachments: { credentialJson: credentialBytes, endorsementJson: endorsement, rekorBundle },
      layout: course.layout || series.layout,
    });

    const blob = new Blob([bytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${currentCert.code}.pdf`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch (e) {
    console.error('PDF generation failed:', e);
    alert(`PDF generation failed: ${e.message}`);
  } finally {
    btn.textContent = origText;
    btn.disabled = false;
  }
}

async function fetchBytes(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${url}: HTTP ${r.status}`);
  return new Uint8Array(await r.arrayBuffer());
}

window.validate = validate;
window.showForm = showForm;
window.setLang = setLang;
window.copyShare = copyShare;
window.shareCert = shareCert;
window.downloadPdf = downloadPdf;
</script>
<script>
/* ══════════════════════════════════════════════════
   Trust checks — signature, status, ledger, rekor
   ══════════════════════════════════════════════════ */

function trustRow({ state, label, detail, href }) {
  const icon = { ok: '✓', bad: '✗', warn: '⚠', pending: '…' }[state] || '…';
  const linkHtml = href ? ` <a class="trust-link" href="${href}" target="_blank" rel="noopener">open ↗</a>` : '';
  return `
    <div class="trust-row">
      <div class="trust-icon ${state}">${icon}</div>
      <div class="trust-label">
        <strong>${label}</strong>
        <span>${detail}${linkHtml}</span>
      </div>
    </div>
  `;
}

function setTrust(rows) {
  document.getElementById('trustRows').innerHTML = rows.join('');
}

async function awaitEngine() {
  if (!window.__engine) await new Promise((r) => window.addEventListener('__engine-ready', r, { once: true }));
  return window.__engine;
}

async function sha256Hex(s) {
  const data = new TextEncoder().encode(s);
  const buf = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(buf), (b) => b.toString(16).padStart(2, '0')).join('');
}

async function runTrustChecks() {
  const rows = [
    { state: 'pending', label: 'Signature', detail: 'verifying…' },
    { state: 'pending', label: 'Revocation', detail: 'checking status list…' },
    { state: 'pending', label: 'Ledger', detail: 'locating credential…' },
    { state: 'pending', label: 'Rekor transparency', detail: 'looking up bundle…' },
  ];
  setTrust(rows.map(trustRow));

  const engine = await awaitEngine();
  const credential = currentCert.credential;

  // ── Status list ──
  try {
    const cs = credential.credentialStatus;
    if (cs && cs.statusListCredential) {
      const listRes = await fetch(cs.statusListCredential);
      if (listRes.ok) {
        const list = await listRes.json();
        const revoked = await engine.checkStatus(list, Number(cs.statusListIndex));
        rows[1] = revoked
          ? { state: 'bad', label: 'Revocation', detail: 'Credential is REVOKED.' }
          : { state: 'ok', label: 'Revocation', detail: 'Not revoked.' };
      } else {
        rows[1] = { state: 'warn', label: 'Revocation', detail: 'Status list unreachable; treating as valid with a warning.' };
      }
    } else {
      rows[1] = { state: 'warn', label: 'Revocation', detail: 'No credentialStatus — revocation not declared.' };
    }
  } catch (e) {
    rows[1] = { state: 'warn', label: 'Revocation', detail: `Status check error: ${e.message}` };
  }
  setTrust(rows.map(trustRow));

  // ── Ledger membership ──
  try {
    const ledgerRes = await fetch('./ledger.jsonl');
    if (!ledgerRes.ok) throw new Error(`ledger HTTP ${ledgerRes.status}`);
    const text = await ledgerRes.text();
    const lines = text.split(/\r?\n/).filter(Boolean);
    const credHash = await sha256Hex(JSON.stringify(credential, null, 2));
    const match = lines.find((l) => l.includes(`"code":"${currentCert.code}"`));
    if (match) {
      const entry = JSON.parse(match);
      const matchesHash = (entry.credential_hash || '').endsWith(credHash);
      rows[2] = matchesHash
        ? { state: 'ok', label: 'Ledger', detail: `Entry #${entry.i} matches; issued ${entry.t.slice(0,10)}.` }
        : { state: 'warn', label: 'Ledger', detail: 'Found entry, but credential hash differs (local JSON may have been re-serialized).' };
    } else {
      rows[2] = { state: 'bad', label: 'Ledger', detail: 'No ledger entry for this code — possible forgery.' };
    }
  } catch (e) {
    rows[2] = { state: 'warn', label: 'Ledger', detail: `Ledger unavailable: ${e.message}` };
  }
  setTrust(rows.map(trustRow));

  // ── Rekor ──
  try {
    const rekorRes = await fetch(`./credentials/${currentCert.code}.rekor.bundle`);
    if (rekorRes.ok) {
      rows[3] = {
        state: 'ok',
        label: 'Rekor transparency',
        detail: 'Inclusion proof committed alongside the credential.',
        href: `https://search.sigstore.dev/?hash=${await sha256Hex(JSON.stringify(credential, null, 2))}`,
      };
      document.getElementById('dlRekor').style.display = '';
    } else if (rekorRes.status === 404) {
      rows[3] = { state: 'warn', label: 'Rekor transparency', detail: 'No Rekor bundle committed (Rekor logging was off for this issuance).' };
    } else {
      rows[3] = { state: 'warn', label: 'Rekor transparency', detail: `Bundle unreachable: HTTP ${rekorRes.status}.` };
    }
  } catch (e) {
    rows[3] = { state: 'warn', label: 'Rekor transparency', detail: `Rekor check error: ${e.message}` };
  }
  setTrust(rows.map(trustRow));

  // ── Signature (heaviest; RDFC canonicalization + verify) ──
  try {
    const documentLoader = engine.createFetchingDocumentLoader();
    const result = await engine.verifyCredential(credential, { documentLoader });
    if (result.verified) {
      rows[0] = { state: 'ok', label: 'Signature', detail: `Ed25519 (${credential.proof?.cryptosuite || 'eddsa-rdfc-2022'}) verified against ${ISSUER_DID}.` };
    } else {
      const err = result.errors?.[0]?.message || result.errors?.[0] || 'unknown';
      rows[0] = { state: 'bad', label: 'Signature', detail: `Invalid signature — ${err}` };
    }
  } catch (e) {
    rows[0] = { state: 'bad', label: 'Signature', detail: `Signature check error: ${e.message}` };
  }
  setTrust(rows.map(trustRow));
}
</script>
<script>
/* ══════════════════════════════════════════════════
   Canvas2D adapter for the shared art DrawOp format
   ══════════════════════════════════════════════════ */

function drawOpsToCanvas(ctx, ops) {
  ctx.save();
  for (const op of ops) {
    const p = new Path2D(op.d);
    if (op.fill) {
      ctx.fillStyle = op.fill;
      ctx.globalAlpha = op.fillOpacity ?? 1;
      ctx.fill(p);
    }
    if (op.stroke) {
      ctx.strokeStyle = op.stroke;
      ctx.globalAlpha = op.strokeOpacity ?? 1;
      ctx.lineWidth = op.strokeWidth ?? 1;
      ctx.stroke(p);
    }
  }
  ctx.restore();
}

/* ══════════════════════════════════════════════════
   Text wrap
   ══════════════════════════════════════════════════ */

function wrapText(ctx, text, maxWidth) {
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxWidth && line) { lines.push(line); line = word; } else line = test;
  }
  if (line) lines.push(line);
  return lines;
}

/* ══════════════════════════════════════════════════
   QR draw
   ══════════════════════════════════════════════════ */

function drawQR(ctx, url, cx, cy, size, color) {
  const QrCode = qrcodegen.QrCode;
  const qr = QrCode.encodeText(url, QrCode.Ecc.MEDIUM);
  const modules = qr.size;
  const cellSize = size / modules;
  ctx.save();
  ctx.fillStyle = '#fafaf8';
  ctx.fillRect(cx - size / 2 - 6, cy - size / 2 - 6, size + 12, size + 12);
  const ox = cx - size / 2, oy = cy - size / 2;
  ctx.fillStyle = color;
  for (let y = 0; y < modules; y++) {
    for (let x = 0; x < modules; x++) {
      if (qr.getModule(x, y)) ctx.fillRect(ox + x * cellSize, oy + y * cellSize, cellSize + 0.5, cellSize + 0.5);
    }
  }
  ctx.restore();
}

/* ══════════════════════════════════════════════════
   Certificate canvas layout
   ══════════════════════════════════════════════════ */

async function renderCertificate() {
  if (!currentCert) return;
  const course = COURSES[currentCert.courseKey];
  const series = SERIES[course.series];
  const layoutKey = course.layout || series.layout;

  const canvas = document.getElementById('certCanvas');
  const ctx = canvas.getContext('2d');
  const W = 2100, H = 2970;
  const margin = 150;
  const str = STRINGS[currentLang];
  const color = course.color;
  const textDark = '#1a1a18', textMid = '#4a4a46', textLight = '#8a8a84';

  const seriesCourses = Object.entries(COURSES)
    .filter(([_, c]) => c.series === course.series)
    .sort(([a], [b]) => a.localeCompare(b));
  const barWidthCurrent = 140, barWidthOther = 35, barGap = 10;
  const totalBarW = seriesCourses.reduce((sum, [k]) => sum + (k === currentCert.courseKey ? barWidthCurrent : barWidthOther) + barGap, -barGap);
  const barStart = W - totalBarW - 30;
  const textRight = barStart - 50, textLeft = margin;
  const cx = (textLeft + textRight) / 2, cw = textRight - textLeft;

  ctx.fillStyle = '#fafaf8'; ctx.fillRect(0, 0, W, H);

  let bx = barStart;
  for (const [key, c] of seriesCourses) {
    const isCurrent = key === currentCert.courseKey;
    const w = isCurrent ? barWidthCurrent : barWidthOther;
    ctx.fillStyle = c.color;
    ctx.globalAlpha = isCurrent ? 0.45 : 0.22;
    ctx.fillRect(bx, 0, w, H);
    ctx.globalAlpha = 1;
    bx += w + barGap;
  }

  // Generative art from the engine bundle (via window.__engine.ART).
  const engine = await awaitEngine();
  const artFn = engine.ART[layoutKey];
  if (artFn) {
    const ops = artFn(currentCert.code, W, H, color);
    drawOpsToCanvas(ctx, ops);
  }

  ctx.textAlign = 'center';
  let y = margin + 200;
  ctx.fillStyle = textLight; ctx.font = '400 28px "IBM Plex Mono", monospace';
  ctx.fillText(series.org, cx, y); y += 110;
  ctx.fillStyle = textDark; ctx.font = '700 110px "IBM Plex Mono", monospace';
  ctx.fillText(series.name.toUpperCase(), cx, y); y += 60;
  ctx.fillStyle = color; ctx.fillRect(cx - 200, y, 400, 3); y += 100;
  ctx.fillStyle = textMid; ctx.font = '500 44px "IBM Plex Sans", sans-serif';
  ctx.fillText(str.certOf, cx, y); y += 120;
  ctx.fillStyle = textLight; ctx.font = '300 32px "IBM Plex Sans", sans-serif';
  ctx.fillText(str.certifies, cx, y); y += 100;
  ctx.fillStyle = textDark;
  let nameSize = 72; ctx.font = `700 ${nameSize}px "IBM Plex Sans", sans-serif`;
  while (ctx.measureText(currentCert.name).width > cw - 60 && nameSize > 36) {
    nameSize -= 2; ctx.font = `700 ${nameSize}px "IBM Plex Sans", sans-serif`;
  }
  ctx.fillText(currentCert.name, cx, y); y += 100;
  ctx.fillStyle = textLight; ctx.font = '300 32px "IBM Plex Sans", sans-serif';
  ctx.fillText(str.completed, cx, y); y += 100;
  ctx.fillStyle = color;
  let titleSize = 48; const titleText = course.title[currentLang];
  ctx.font = `600 ${titleSize}px "IBM Plex Mono", monospace`;
  while (ctx.measureText(titleText).width > cw - 40 && titleSize > 28) {
    titleSize -= 2; ctx.font = `600 ${titleSize}px "IBM Plex Mono", monospace`;
  }
  ctx.fillText(titleText, cx, y); y += 80;
  ctx.fillStyle = textLight; ctx.font = '400 24px "IBM Plex Sans", sans-serif';
  ctx.fillText(str.topics + ':', cx, y); y += 50;
  ctx.textAlign = 'left'; ctx.fillStyle = textMid; ctx.font = '400 25px "IBM Plex Sans", sans-serif';
  const bulletIndent = cx - cw / 2 + 40; const bulletTextX = bulletIndent + 30;
  for (const item of course.desc[currentLang]) {
    ctx.fillStyle = color; ctx.fillText('\u2022', bulletIndent, y);
    ctx.fillStyle = textMid;
    const wrapped = wrapText(ctx, item, cw - 100);
    for (const line of wrapped) { ctx.fillText(line, bulletTextX, y); y += 36; }
    y += 4;
  }
  ctx.textAlign = 'center'; y += 40;
  ctx.fillStyle = textDark; ctx.font = '500 28px "IBM Plex Sans", sans-serif';
  ctx.fillText(str.workload + ': ' + course.hours + ' ' + str.hours, cx, y); y += 80;
  const dateObj = new Date((currentCert.date || new Date().toISOString().slice(0,10)) + 'T12:00:00');
  const locale = currentLang === 'pt' ? 'pt-BR' : 'en-US';
  const dateStr = new Intl.DateTimeFormat(locale, { year: 'numeric', month: 'long', day: 'numeric' }).format(dateObj);
  ctx.fillStyle = textLight; ctx.font = '400 26px "IBM Plex Sans", sans-serif';
  ctx.fillText(str.dateLabel + ': ' + dateStr, cx, y);

  let by = H - margin - 80;
  const baseURL = window.location.href.split('#')[0];
  const shareURL = isPreview
    ? `${baseURL}#preview=${encodeURIComponent(currentCert.courseKey)}`
    : `${baseURL}#v=${encodeURIComponent(currentCert.code)}&n=${encodeURIComponent(currentCert.name)}`;
  drawQR(ctx, shareURL, cx, by, 180, textDark); by -= 120;
  ctx.fillStyle = textLight; ctx.font = '400 20px "IBM Plex Mono", monospace';
  ctx.fillText(str.validURL + ': ' + baseURL, cx, by); by -= 50;
  ctx.fillStyle = textMid; ctx.font = '500 24px "IBM Plex Mono", monospace';
  ctx.fillText(str.validCode + ': ' + currentCert.code, cx, by); by -= 50;
  ctx.fillStyle = color; ctx.fillRect(cx - 200, by, 400, 2); by -= 100;
  ctx.fillStyle = textLight; ctx.font = '400 24px "IBM Plex Sans", sans-serif';
  ctx.fillText(series.issuerTitle[currentLang], cx, by); by -= 45;
  ctx.fillStyle = textDark; ctx.font = '600 34px "IBM Plex Sans", sans-serif';
  ctx.fillText(series.issuer, cx, by); by -= 30;
  ctx.strokeStyle = textLight; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx - 160, by); ctx.lineTo(cx + 160, by); ctx.stroke();

  if (isPreview) {
    by -= 10;
    ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.font = '700 32px "IBM Plex Mono", monospace'; ctx.textAlign = 'center';
    ctx.fillText('SAMPLE \u2014 NOT A VALID CERTIFICATE', cx, by);
    ctx.save(); ctx.translate(W / 2, H / 2); ctx.rotate(-Math.PI / 4);
    ctx.font = '700 220px "IBM Plex Mono", monospace'; ctx.fillStyle = 'rgba(0,0,0,0.07)';
    ctx.textBaseline = 'middle';
    ctx.fillText('SAMPLE', 0, -140); ctx.fillText('SAMPLE', 0, 140);
    ctx.restore();
  }
}
